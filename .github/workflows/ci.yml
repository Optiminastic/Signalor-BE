name: CI

# Lint + tests on every push/PR to main. Separate from deploy.yml (which only
# builds and ships the image) — this is the gate that was missing, so ruff and
# the test suite now run automatically instead of only locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & test (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff (lint)
        run: ruff check .

      - name: Tests
        # test settings use in-memory SQLite with migrations disabled, so no
        # Postgres service is needed here.
        run: python manage.py test --settings=config.settings.test --verbosity=2
        env:
          SECRET_KEY: ci-test-secret-not-used-in-prod
          DJANGO_SETTINGS_MODULE: config.settings.test

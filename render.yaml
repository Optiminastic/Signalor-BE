databases:
  - name: signalor-db
    plan: starter
    databaseName: signalor
    user: signalor

services:
  - type: redis
    name: signalor-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: signalor-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Migrations + drift reconciliation run once per deploy before traffic
    # cuts over. Replaces the corresponding steps that used to live in
    # build.sh (no longer used since the web service runs from the image).
    preDeployCommand: "python scripts/reconcile_migrations.py && python manage.py migrate --no-input"
    startCommand: opentelemetry-instrument gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 600
    healthCheckPath: /api/auth/get-session
    envVars:
      # Re-enable the Playwright-backed screenshot capture in
      # apps/analyzer/services/content_optimisation.py. We disabled it
      # while the binary was getting wiped on the Python runtime; on
      # this Docker image chromium is baked into the layer so the
      # capture works reliably.
      - key: ENABLE_SERVER_SCREENSHOTS
        value: "1"
      # --- OpenTelemetry → Better Stack ---
      - key: OTEL_SERVICE_NAME
        value: signalor-backend
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: service.name=signalor-backend,deployment.environment=production
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: https://s2446917.eu-fsn-3.betterstackdata.com
      # Bearer token for the Better Stack source. Set in Render dashboard (sync: false).
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_TRACES_EXPORTER
        value: otlp
      - key: OTEL_METRICS_EXPORTER
        value: otlp
      - key: OTEL_LOGS_EXPORTER
        value: otlp
      - key: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "true"
      - key: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      # Same Redis instance is reused as Celery's broker — keeps infra simple.
      # Without this, .delay() falls back to CELERY_TASK_ALWAYS_EAGER and the
      # web process would run sitemap audits inline, defeating the worker.
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      # Broker for the analysis Celery app (config.celery_rabbit). Without it the
      # dispatcher falls back to running analyses inline in a web thread instead
      # of handing them to signalor-analysis-worker. External broker (CloudAMQP).
      - key: RABBITMQ_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: api.signalor.ai,signalor-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://signalor.ai,https://www.signalor.ai,https://staging.signalor.ai,http://localhost:3000
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      - key: ADMIN_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUBSCRIPTION_REQUIRED
        value: "true"
      - key: ENFORCE_PLAN_LIMITS
        value: "true"
      - key: REQUIRE_SUBSCRIPTION_FOR_INTEGRATIONS
        value: "true"
      - key: DODO_API_KEY
        sync: false
      - key: DODO_LIVE_MODE
        value: "true"
      - key: DODO_PRODUCT_ID_STARTER
        sync: false
      - key: DODO_PRODUCT_ID_PRO
        sync: false
      - key: DODO_PRODUCT_ID_BUSINESS
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: DODO_REFEREE_DISCOUNT_ID
        sync: false
      - key: DODO_REFERRER_DISCOUNT_ID
        sync: false
      - key: DODO_REFEREE_DISCOUNT_CODE
        sync: false
      - key: DODO_REFERRER_DISCOUNT_CODE
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID_USD
        sync: false
      - key: STRIPE_PRICE_ID_INR
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Both redirect URIs must be set explicitly: the settings defaults point at
      # localhost, so omitting them here silently builds consent URLs that send
      # production users to their own machine. Each must also be registered on the
      # OAuth client in the Google Cloud console, byte-for-byte.
      - key: GOOGLE_ANALYTICS_REDIRECT_URI
        value: https://signalor.ai/settings/integrations/callback/google-analytics
      - key: GOOGLE_SEARCH_CONSOLE_REDIRECT_URI
        value: https://api.signalor.ai/api/integrations/google-search-console/callback/
      - key: GEMINI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_REDIRECT_URI
        value: https://api.signalor.ai/api/integrations/shopify/callback
      - key: SHOPIFY_APP_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: INTERNAL_EMAILS
        sync: false
      # Backblaze B2 cache for Dodo invoice PDFs. When all four are set, the
      # invoice endpoint serves from B2 on cache hit and uploads on first
      # successful Dodo fetch. Absent → invoice flow works as before, no
      # cache. ``B2_REGION`` is optional and defaults to ``us-west-002``.
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_ENDPOINT
        sync: false
      - key: B2_REGION
        sync: false

  - type: worker
    name: signalor-celery-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: ./build.sh
    # Single worker process, modest concurrency — sitemap audits are mostly
    # network-bound. Bump --concurrency when more tasks land on Celery.
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Worker stays on the Python runtime — sitemap audits use plain
      # requests, no Playwright needed here. If that ever changes, switch
      # this service to runtime: docker too (using ./Dockerfile).
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      # Celery picks up REDIS_URL via settings.base if CELERY_BROKER_URL is
      # unset; setting it explicitly here documents the intent.
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      - key: ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false

  - type: worker
    name: signalor-analysis-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: ./build.sh
    # Dedicated worker for the analyze / re-analyze pipeline on the RabbitMQ
    # Celery app (config.celery_rabbit). Sitemap audits stay on the Redis
    # worker above. Bump --concurrency as analysis volume grows.
    startCommand: celery -A config.celery_rabbit worker -Q analysis --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      # Still needed: the analysis pipeline reads/invalidates the Redis cache.
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      # Render has no managed RabbitMQ — point this at an external broker
      # (e.g. CloudAMQP): amqp://user:pass@host:5672/vhost
      - key: RABBITMQ_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      - key: ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false

  - type: cron
    name: signalor-scheduled-analyses
    runtime: python
    plan: starter
    region: oregon
    schedule: "*/30 * * * *"
    buildCommand: ./build.sh
    startCommand: python manage.py run_scheduled_analyses
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      - key: ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - type: cron
    name: signalor-cleanup-stale-rewards
    runtime: python
    plan: starter
    region: oregon
    schedule: "0 4 * * *"
    buildCommand: ./build.sh
    startCommand: python manage.py cleanup_stale_rewards
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: api.signalor.ai

  # Daily re-check of open fixes. Re-verifies each brand's still-open on-page
  # recommendations against the live site, then re-ranks them and flags one
  # "priority fix of the day" (daily_priority_rank / is_top_fix) — which is what
  # the Growth Agent's plan is ordered by. Cheap: the verifier caches one page
  # fetch per run and makes no LLM calls. RECHECK_LIMIT caps brands per tick
  # without a redeploy (0 = all).
  - type: cron
    name: signalor-recheck-recommendations
    runtime: python
    plan: starter
    region: oregon
    schedule: "0 3 * * *"
    buildCommand: ./build.sh
    startCommand: python manage.py recheck_recommendations --limit ${RECHECK_LIMIT:-0}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: RECHECK_LIMIT
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: ALLOWED_HOSTS
        value: api.signalor.ai

  # Lifecycle drip queue — ticks every 10 min and sends the next-due email
  # (E1 30m / E2 24h / E3 48h / E4 72h) to enrolled, non-suppressed users.
  # process_drip_queue is idempotent (never resends a step) and honours each
  # user's due time + the 20h anti-burst gap, so a missed tick just retries.
  - type: cron
    name: signalor-drip-queue
    runtime: python
    plan: starter
    region: oregon
    schedule: "*/10 * * * *"
    buildCommand: ./build.sh
    startCommand: python manage.py process_drip_queue
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      # SMTP creds — the only secrets this cron needs. Copy from the
      # signalor-backend web service. (No Gemini/DataForSEO/encryption key:
      # the drip just reads persisted run data and sends email.)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: hello@signalor.ai
      # All lifecycle mail sends from hello@signalor.ai as "Team Signalor".
      # FOUNDER_* drives Email 4's From header + the unsubscribe mailto.
      - key: FOUNDER_FROM_EMAIL
        value: hello@signalor.ai
      - key: FOUNDER_FROM_NAME
        value: Team Signalor
      # NEVER set DRIP_FAST_MODE here — it compresses the 4-email sequence to
      # ~4 minutes. The command also refuses to start if FAST_MODE + DEBUG=False.

  # Weekly AI-visibility email — Fridays 09:00 UTC.
  - type: cron
    name: signalor-weekly-emails
    runtime: python
    plan: starter
    region: oregon
    schedule: "0 9 * * 5"
    buildCommand: ./build.sh
    startCommand: python manage.py send_weekly_emails
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      - key: FRONTEND_BASE_URL
        value: https://signalor.ai
      # SMTP creds — the only secrets this cron needs. Copy from the
      # signalor-backend web service.
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: hello@signalor.ai

  # Daily auto-backlinks — hourly tick publishes one fresh blog to each of the 5
  # satellite sites for every brand whose schedule is due, then reschedules +24h.
  # Brands' next_run_at spread across the day, so load is spread and each brand
  # gets its 5-blog batch ~24h apart. run_auto_backlinks is idempotent per day.
  - type: cron
    name: signalor-backlink-scheduler
    runtime: python
    plan: starter
    region: oregon
    schedule: "0 * * * *"
    buildCommand: ./build.sh
    startCommand: python manage.py run_backlink_schedules
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          type: web
          name: signalor-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: signalor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: signalor-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.signalor.ai
      # Gemini generates the blogs; the S3 backlink store persists them.
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKLINKS_BLOG_AWS_BUCKET
        sync: false
      - key: BACKLINKS_BLOG_AWS_REGION
        sync: false
      - key: BACKLINKS_BLOG_AWS_PREFIX
        sync: false
      - key: BACKLINKS_BLOG_AWS_ACCESS_KEY_ID
        sync: false
      - key: BACKLINKS_BLOG_AWS_SECRET_ACCESS_KEY
        sync: false
